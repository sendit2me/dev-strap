services:
  web:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME}-web
    ports:
      - "${HTTP_PORT}:80"
    command: caddy respond --listen :80 "Hello from Caddy"
    networks:
      devstack-internal:
        aliases:
          - api.stripe.com
          - api.sendgrid.com
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10
