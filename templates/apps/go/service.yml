services:
  app:
    build:
      context: ${APP_SOURCE}
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-app
    volumes:
      - ${APP_SOURCE}:/app
      - devstack-go-modules:/go/pkg/mod
      - devstack-certs:/certs:ro
    working_dir: /app
    environment:
      - GO_ENV=development
      - PORT=3000
      - SSL_CERT_FILE=/certs/ca.crt
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - devstack-internal

volumes:
  devstack-go-modules:
  devstack-certs:
