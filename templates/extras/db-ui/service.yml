services:
  db-ui:
    image: adminer:latest
    container_name: ${PROJECT_NAME}-db-ui
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devstack-internal
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10
