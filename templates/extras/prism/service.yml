services:
  prism:
    image: stoplight/prism:5
    container_name: ${PROJECT_NAME}-prism
    command: ["mock", "-h", "0.0.0.0", "-p", "4010", "-d", "/spec/openapi.yaml"]
    ports:
      - "${PRISM_PORT}:4010"
    volumes:
      - ${APP_SOURCE}/${PRISM_SPEC_PATH}:/spec/openapi.yaml:ro
    networks:
      - devstack-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4010/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
